name = "weeklog-worker"
main = "worker/src/index.ts"
compatibility_date = "2024-09-23"

# D1 database. Create with: wrangler d1 create weeklog
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "weeklog"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "worker/migrations"

# R2 bucket for media uploads. Create with: wrangler r2 bucket create weeklog-media
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "weeklog-media"

# Public, non-secret config (safe to commit).
[vars]
SUPABASE_URL = "https://euzvqdnonmkechsdtryr.supabase.co"
ADMIN_EMAIL = "vibha.aarav@gmail.com"
# Lock CORS to your deployed Pages URL once you have it (defaults to "*" if unset).
# FRONTEND_ORIGIN = "https://weeklog.pages.dev"

# SUPABASE_ANON_KEY (publishable key) is provided via .dev.vars for local dev.
# For deploy, set it once with:  wrangler secret put SUPABASE_ANON_KEY
# (It is a public key, but secret put keeps it out of the committed config.)
