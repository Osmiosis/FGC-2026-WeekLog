name = "weeklog-worker"
main = "worker/src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1 database. Create with: wrangler d1 create weeklog
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "weeklog"
database_id = "002c3ab7-b1eb-49eb-91e7-a52d8112cad6"
migrations_dir = "worker/migrations"

# R2 bucket for media uploads. Create with: wrangler r2 bucket create weeklog-media
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "weeklog-media"

# Public, non-secret config (safe to commit).
[vars]
ADMIN_EMAIL = "vibha.aarav@gmail.com"
# Comma-separated allowed frontend origins (CORS + Better Auth trustedOrigins).
FRONTEND_ORIGIN = "https://weeklog.pages.dev,https://fgc-weeklog-demo.pages.dev"
# The demo site: requests from this origin treat every signed-in user as admin.
DEMO_ORIGIN = "https://fgc-weeklog-demo.pages.dev"
# Better Auth base URL = this Worker's own origin (used to build the Google callback).
BETTER_AUTH_URL = "https://weeklog-worker.fgcworker.workers.dev"
# Role model: only ADMIN_EMAIL (vibha.aarav@gmail.com) is admin; everyone else who
# signs in is a member. Set to "true" to make EVERY signed-in user admin (open demo).
DEMO_ALL_ADMIN = "false"

# Secrets (set once, never commit):
#   wrangler secret put BETTER_AUTH_SECRET   # 32+ random chars
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
